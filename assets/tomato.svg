<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="body" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FF6659"/>
      <stop offset="60%" stop-color="#F44336"/>
      <stop offset="100%" stop-color="#C62828"/>
    </radialGradient>
    <radialGradient id="highlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="256" cy="460" rx="140" ry="22" fill="#000" opacity="0.10"/>

  <!-- Main body -->
  <ellipse cx="256" cy="290" rx="195" ry="175" fill="url(#body)"/>

  <!-- Subtle vertical crease lines -->
  <path d="M256 120 Q252 290 256 460" stroke="#D32F2F" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M170 145 Q175 290 170 435" stroke="#D32F2F" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M342 145 Q337 290 342 435" stroke="#D32F2F" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- Specular highlight -->
  <ellipse cx="205" cy="235" rx="60" ry="45" fill="url(#highlight)" transform="rotate(-20 205 235)"/>

  <!-- Stem -->
  <rect x="248" y="95" width="16" height="40" rx="5" fill="url(#stem)"/>

  <!-- Leaves -->
  <path d="M256 125 Q210 80 160 100 Q200 100 240 125 Z" fill="url(#leaf)"/>
  <path d="M256 125 Q225 65 185 60  Q215 75 245 115 Z" fill="url(#leaf)" opacity="0.85"/>
  <path d="M264 125 Q305 80 355 100 Q315 100 275 125 Z" fill="url(#leaf)"/>
  <path d="M264 125 Q295 70 330 65  Q300 78 274 115 Z" fill="url(#leaf)" opacity="0.85"/>
  <path d="M256 120 Q256 70 270 50  Q258 72 258 115 Z" fill="#2E7D32" opacity="0.7"/>
</svg>
